<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Talks 2026</title>
    <style>
        :root {
            --primary-color: #007bff;
            --secondary-color: #6c757d;
            --background-color: #f8f9fa;
            --font-color: #212529;
            --card-bg: #ffffff;
            --card-shadow: 0 4px 8px rgba(0,0,0,0.1);
            --border-radius: 8px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--background-color);
            color: var(--font-color);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 900px;
        }
        header {
            text-align: center;
            margin-bottom: 2rem;
        }
        header h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        header p {
            font-size: 1.2rem;
            color: var(--secondary-color);
        }
        .search-bar {
            width: 100%;
            padding: 0.75rem;
            font-size: 1rem;
            border-radius: var(--border-radius);
            border: 1px solid #ced4da;
            margin-bottom: 2rem;
            box-sizing: border-box;
        }
        #schedule-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .schedule-item {
            display: flex;
            gap: 1.5rem;
        }
        .time-slot {
            flex-basis: 120px;
            text-align: right;
            padding-top: 0.5rem;
            font-weight: bold;
            color: var(--secondary-color);
        }
        .talk-card, .break-card {
            flex: 1;
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
            padding: 1.5rem;
            transition: all 0.3s ease;
        }
        .talk-card.hidden {
            display: none;
        }
        .talk-card h3 {
            margin-top: 0;
            color: var(--primary-color);
        }
        .talk-card .speakers {
            font-style: italic;
            color: #555;
            margin-bottom: 1rem;
        }
        .talk-card .description {
            color: #444;
            margin-bottom: 1rem;
        }
        .talk-card .categories {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .category-tag {
            background-color: #e9ecef;
            color: #495057;
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.8rem;
        }
        .break-card {
            background-color: #e0e0e0;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @media (max-width: 768px) {
            body { padding: 1rem; }
            .schedule-item { flex-direction: column; gap: 0.5rem; }
            .time-slot { text-align: left; padding-bottom: 0.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Tech Talks 2026</h1>
            <p>A One-Day Journey into the Future of Technology</p>
        </header>

        <input type="text" id="search-input" class="search-bar" placeholder="Search by category (e.g., AI, Web, Cloud)...">

        <div id="schedule-container"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const talks = [
                {
                    title: "The Future of AI: Beyond Today's Models",
                    speakers: ["Dr. Evelyn Reed"],
                    category: ["AI", "Machine Learning", "Future Tech"],
                    description: "A deep dive into the next generation of artificial intelligence, exploring new architectures and their potential impact on society."
                },
                {
                    title: "Modern JavaScript Frameworks: A Comparative Analysis",
                    speakers: ["Alex Chen", "Maria Garcia"],
                    category: ["Web Development", "JavaScript", "Frontend"],
                    description: "This talk compares the performance, ecosystem, and developer experience of the top 3 JavaScript frameworks today."
                },
                {
                    title: "Scaling Applications with Serverless Architecture",
                    speakers: ["David Kim"],
                    category: ["Cloud", "DevOps", "Architecture"],
                    description: "Learn how to build and deploy highly scalable, cost-effective applications using serverless technologies on major cloud platforms."
                },
                {
                    title: "Ethical AI: Navigating the Grey Areas",
                    speakers: ["Prof. Samuel Jones"],
                    category: ["AI", "Ethics"],
                    description: "An essential discussion on the ethical challenges posed by AI, from algorithmic bias to autonomous decision-making."
                },
                {
                    title: "The Quantum Threat to Modern Cryptography",
                    speakers: ["Dr. Isabella Rossi"],
                    category: ["Cybersecurity", "Quantum Computing"],
                    description: "Understand how quantum computers could break current encryption standards and what the world is doing to prepare."
                },
                {
                    title: "High-Performance Web: Optimizing for Speed",
                    speakers: ["Ben Carter", "Zoe Williams"],
                    category: ["Web Development", "Performance", "Frontend"],
                    description: "Practical tips and advanced techniques for making your websites and web applications faster than ever."
                }
            ];

            const scheduleContainer = document.getElementById('schedule-container');
            const searchInput = document.getElementById('search-input');

            const eventConfig = {
                startTime: { hours: 10, minutes: 0 },
                talkDuration: 60, // minutes
                transitionTime: 10, // minutes
                lunchBreakTime: 60 // minutes
            };

            function formatTime(date) {
                return date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
            }

            function renderSchedule() {
                scheduleContainer.innerHTML = '';
                const searchTerm = searchInput.value.toLowerCase().trim();

                const baseTime = new Date();
                baseTime.setHours(eventConfig.startTime.hours, eventConfig.startTime.minutes, 0, 0);

                let talkCounter = 0;
                for (let i = 0; i < talks.length; i++) {
                    const talk = talks[i];

                    if (i === 3) { // Insert lunch break after the 3rd talk
                        const lunchStartTime = new Date(baseTime);
                        baseTime.setMinutes(baseTime.getMinutes() + eventConfig.lunchBreakTime);
                        const lunchEndTime = new Date(baseTime);
                        
                        scheduleContainer.innerHTML += `
                            <div class="schedule-item">
                                <div class="time-slot">${formatTime(lunchStartTime)} - ${formatTime(lunchEndTime)}</div>
                                <div class="break-card">
                                    <span>🥪 Lunch Break</span>
                                </div>
                            </div>
                        `;
                         baseTime.setMinutes(baseTime.getMinutes() + eventConfig.transitionTime);
                    }

                    const talkStartTime = new Date(baseTime);
                    baseTime.setMinutes(baseTime.getMinutes() + eventConfig.talkDuration);
                    const talkEndTime = new Date(baseTime);
                    
                    const isVisible = searchTerm === '' || talk.category.some(cat => cat.toLowerCase().includes(searchTerm));

                    const talkHtml = `
                        <div class="schedule-item">
                            <div class="time-slot">${formatTime(talkStartTime)} - ${formatTime(talkEndTime)}</div>
                            <div class="talk-card ${isVisible ? '' : 'hidden'}">
                                <h3>${talk.title}</h3>
                                <p class="speakers">By: ${talk.speakers.join(', ')}</p>
                                <p class="description">${talk.description}</p>
                                <div class="categories">
                                    ${talk.category.map(cat => `<span class="category-tag">${cat}</span>`).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                    scheduleContainer.innerHTML += talkHtml;

                    baseTime.setMinutes(baseTime.getMinutes() + eventConfig.transitionTime);
                }
            }

            searchInput.addEventListener('input', renderSchedule);
            renderSchedule(); // Initial render
        });
    </script>
</body>
</html>
